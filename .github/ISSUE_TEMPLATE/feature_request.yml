name: Feature request
description: Suggest an improvement to the lab, docs, or developer experience
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion.

        This repo is optimized for safe, local-only, synthetic training. Please keep requests aligned with that scope.
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Add a second synthetic device for inventory grouping examples
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What learning gap or developer pain point does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Note any constraints the change must preserve
      placeholder: Keep Windows as the entrypoint and avoid real credentials
    validations:
      required: false

